name: Build and Validate (Rust crate)

on:
  workflow_dispatch:
  push:
    paths:
      - packages/rust/**
    branches:
      - 'feature/**'
      - 'release/**'
      - 'bug/**'
      - 'issue/**'
      - 'fix/**'

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/rust

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-features -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    needs: check
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: packages/rust

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable

      - name: Test all features
        run: cargo test --all-features --verbose

      - name: Test no_std
        run: cargo test --no-default-features

      - name: Doc tests
        if: matrix.os == 'ubuntu-latest'
        run: cargo test --doc --all-features

  build:
    name: Build (${{ matrix.os }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: packages/rust

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --all-features --verbose

  docs:
    name: Documentation
    needs: check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/rust

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable

      - name: Build docs
        run: cargo doc --all-features --no-deps

  test-contrast:
    needs: check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/rust

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable

      - name: Test contrast
        run: cargo test --features contrast

  cross-format-check:
    needs: check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/rust

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable

      - name: Cross-format test
        run: cargo test --test cross_format

  msrv:
    needs: check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/rust

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"

      - name: Check MSRV
        run: cargo check --all-features

  coverage:
    needs: check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/rust

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Coverage (>= 80%)
        run: cargo llvm-cov --all-features --fail-under-lines 80

  security:
    needs: check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/rust

    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/install-action@cargo-audit

      - name: Security audit
        run: cargo audit
