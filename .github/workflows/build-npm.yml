name: Build and Validate

on:
  workflow_dispatch:
  push:
    paths:
      - packages/typescript/**
    branches:
      - 'feature/**'
      - 'release/**'
      - 'bug/**'
      - 'issue/**'
      - 'fix/**'
  pull_request:
    paths:
      - packages/typescript/**
    branches:
      - 'feature/**'
      - 'release/**'
      - 'bug/**'
      - 'issue/**'
      - 'fix/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/typescript

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.15.0"
          cache: npm
          cache-dependency-path: packages/typescript/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run typecheck

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

  build:
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/typescript

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.15.0"
          cache: npm
          cache-dependency-path: packages/typescript/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: packages/typescript/dist/
