[package]
name = "jandi-colors"
version = "0.1.0"
edition = "2024"
rust-version = "1.95.0"
description = "Color palette derived from the blue pigment of jenipapo (Genipa americana)"
license = "MIT"
repository = "https://github.com/franciscotbjr/jandi-colors"
homepage = "https://github.com/franciscotbjr/jandi-colors"
documentation = "https://docs.rs/jandi-colors"
readme = "README.md"
keywords = ["color", "palette", "design", "jenipapo", "indigenous"]
categories = ["visualization", "gui", "no-std::no-alloc"]

[features]
default = []
std = []
serde = ["dep:serde"]
ratatui = ["dep:ratatui"]
iced = ["dep:iced_core"]
bevy = ["dep:bevy_color"]
egui = ["dep:egui"]
crossterm = ["dep:crossterm"]
palette = ["dep:palette"]
contrast = ["dep:libm", "dep:arrayvec"]

[dependencies]
serde = { version = "1.0", optional = true, default-features = false, features = ["derive"] }
ratatui = { version = "0.30", optional = true, default-features = false }
iced_core = { version = "0.14", optional = true, default-features = false }
bevy_color = { version = "0.18.1", optional = true }
egui = { version = "0.34.2", optional = true, default-features = false }
crossterm = { version = "0.29", optional = true }
palette = { version = "0.7", optional = true }
libm = { version = "0.2", optional = true, default-features = false }
arrayvec = { version = "0.7", optional = true, default-features = false }

[dev-dependencies]
serde_json = "1.0"
regex = "1.0"
ratatui = "0.30"
iced_core = "0.14"
bevy_color = "0.18.1"
egui = "0.34.2"
crossterm = "0.29"

[[example]]
name = "print_palette"
required-features = ["crossterm"]

[[example]]
name = "ratatui_demo"
required-features = ["ratatui"]

[[example]]
name = "iced_demo"
required-features = ["iced"]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
